apiVersion: kustomize.toolkit.fluxcd.io/v1
kind: Kustomization
metadata:
  name: network-gateways
  namespace: flux-system
spec:
  interval: 5m0s
  retryInterval: 2m0s
  path: ./clusters/gpu-dev/network/gateways
  prune: true
  wait: false
  timeout: 3m0s
  dependsOn:
    - name: flux-system
  healthChecks:
    - apiVersion: helm.toolkit.fluxcd.io/v2
      kind: HelmRelease
      name: istio-ingress
      namespace: istio-system
  sourceRef:
    kind: GitRepository
    name: flux-system
