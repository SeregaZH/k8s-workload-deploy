apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: istio-ingress
  namespace: istio-system
spec:
  releaseName: istio-ingress
  interval: 10m
  install:
    disableOpenAPIValidation: true
  upgrade:
    disableOpenAPIValidation: true
  dependsOn:
    - name: istio-base
      namespace: istio-system
    - name: istiod
      namespace: istio-system
  chart:
    spec:
      chart: gateway
      version: "1.24.0"
      sourceRef:
        kind: HelmRepository
        name: istio-helm-repo
        namespace: flux-system
  values: {}
  postRenderers:
    - kustomize:
        patches:
          - target:
              kind: Service
              name: istio-ingress
            patch: |
              - op: replace
                path: /spec/type
                value: NodePort
              - op: add
                path: /spec/ports/1/nodePort
                value: 30080
              - op: add
                path: /spec/ports/2/nodePort
                value: 30443