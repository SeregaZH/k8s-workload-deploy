apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: istio-ingress
  namespace: istio-system
spec:
  releaseName: istio-ingress
  interval: 10m
  install:
    disableOpenAPIValidation: true
    disableSchemaValidation: true
  upgrade:
    disableOpenAPIValidation: true
    disableSchemaValidation: true
  dependsOn:
    - name: istio-base
      namespace: istio-system
    - name: istiod
      namespace: istio-system
  chart:
    spec:
      chart: gateway
      version: "1.25.2"
      sourceRef:
        kind: HelmRepository
        name: istio-helm-repo
        namespace: flux-system
